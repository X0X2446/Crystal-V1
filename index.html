<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crystal — VidLux • Immersive</title>
    <link rel="preconnect" href="https://image.tmdb.org">
    <link rel="icon" type="image/svg+xml" href="/crystal.svg">
    <meta name="description" content="Crystal - minimalist immersive movie and anime streaming">
    
    <script type="module">
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          // We register the service worker here, but we DON'T use a <script src="..."> tag for it
          navigator.serviceWorker.register('/scramjet/sw.js', {
            scope: '/scramjet/'
          }).then(reg => console.log('Scramjet SW registered'))
            .catch(err => console.error('Scramjet SW failed', err));
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
