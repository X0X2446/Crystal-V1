<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crystal — VidLux</title>
    
    <script type="module">
      async function initProxy() {
        if ('serviceWorker' in navigator) {
          try {
            // Registering with a wide scope so it can see the /scramjet/ path
            const registration = await navigator.serviceWorker.register('/sw.js', {
              scope: '/'
            });
            console.log('Proxy Worker: Registered');
          } catch (err) {
            console.error('Proxy Worker: Error', err);
          }
        }
      }
      initProxy();

      window.proxyURL = function(url) {
        if (!url || url.includes('/scramjet/')) return url;
        // Standard encoding for Scramjet v2
        const encoded = btoa(url).replace(/\//g, '_').replace(/\+/g, '-').replace(/=/g, '');
        return `/scramjet/${encoded}`;
      };
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
