<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crystal — VidLux • Immersive</title>
    <link rel="icon" type="image/svg+xml" href="/crystal.svg">
    
    <script type="module">
      // Register the Service Worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/scramjet/sw.js', {
            scope: '/scramjet/'
          });
        });
      }

      // Updated proxy function
      window.proxyURL = function(url) {
        if (!url) return "";
        if (url.startsWith(window.location.origin)) return url;
        
        // Encodes the URL safely for the Scramjet engine
        const encoded = btoa(url)
          .replace(/\//g, '_')
          .replace(/\+/g, '-')
          .replace(/=/g, '');
          
        return `/scramjet/${encoded}`;
      };
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
