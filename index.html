<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crystal — VidLux</title>
    
    <script type="module">
      async function registerSW() {
        if ('serviceWorker' in navigator) {
          try {
            // Register from root, but set scope to /scramjet/
            await navigator.serviceWorker.register('/sw.js', {
              scope: '/scramjet/'
            });
            console.log('Scramjet SW: Registered');
          } catch (err) {
            console.error('Scramjet SW: Registration Failed', err);
          }
        }
      }
      registerSW();

      window.proxyURL = function(url) {
        if (!url || url.includes('/scramjet/')) return url;
        const encoded = btoa(url).replace(/\//g, '_').replace(/\+/g, '-').replace(/=/g, '');
        return `/scramjet/${encoded}`;
      };
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
