<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crystal — VidLux • Immersive</title>
    <link rel="icon" type="image/svg+xml" href="/crystal.svg">
    
    <script type="module">
      // Register the proxy's brain (The Service Worker)
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          // Note: we point to the scramjet folder we set up in server.js
          navigator.serviceWorker.register('/scramjet/sw.js', {
            scope: '/scramjet/'
          }).then(() => console.log('Proxy ready!'))
            .catch(err => console.error('Proxy failed:', err));
        });
      }

      // The magic function for your React code
      window.proxyURL = function(url) {
        if (!url || url.includes('/scramjet/')) return url;
        const encoded = btoa(url).replace(/\//g, '_').replace(/\+/g, '-').replace(/=/g, '');
        return `/scramjet/${encoded}`;
      };
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
