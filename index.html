<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crystal — VidLux</title>

    <script type="module">
      // Register the service worker and wait until it is actually controlling
      // this page before we mark the proxy as ready. Without this wait, the
      // first proxyURL() call can fire before the SW has claimed the page,
      // causing the /scramjet/ fetch to fall through to the catch-all and
      // return index.html instead of the proxied video.
      async function initProxy() {
        if (!('serviceWorker' in navigator)) {
          console.warn('Service workers not supported');
          return;
        }

        try {
          const registration = await navigator.serviceWorker.register('/sw.js', {
            scope: '/',
            updateViaCache: 'none',
          });

          // If a SW is already controlling us we're good immediately
          if (navigator.serviceWorker.controller) {
            console.log('Proxy SW: already active');
            window.__swReady = true;
            return;
          }

          // Otherwise wait for the new SW to claim this client
          await new Promise((resolve) => {
            const onController = () => {
              navigator.serviceWorker.removeEventListener('controllerchange', onController);
              resolve();
            };

            // SW installed but not yet active → wait for it to activate & claim
            const sw = registration.installing || registration.waiting || registration.active;
            if (registration.active && !navigator.serviceWorker.controller) {
              // Active but hasn't claimed yet — trigger claim via message
              registration.active.postMessage({ type: 'CLAIM' });
            }

            navigator.serviceWorker.addEventListener('controllerchange', onController);

            // Safety timeout — if SW never claims (e.g. hard-refresh), proceed anyway
            setTimeout(resolve, 3000);
          });

          console.log('Proxy SW: ready');
          window.__swReady = true;
        } catch (err) {
          console.error('Proxy SW: registration failed', err);
        }
      }

      // Encode a URL for Scramjet v2
      window.proxyURL = function(url) {
        if (!url) return url;
        if (url.includes('/scramjet/')) return url; // already encoded
        const encoded = btoa(url)
          .replace(/\//g, '_')
          .replace(/\+/g, '-')
          .replace(/=/g, '');
        return `/scramjet/${encoded}`;
      };

      initProxy();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
