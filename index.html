<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crystal — VidLux • Immersive</title>
    <link rel="icon" type="image/svg+xml" href="/crystal.svg">
    
    <script type="module">
      // 1. Register the Service Worker (The unblocker)
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/scramjet/sw.js', {
            scope: '/scramjet/'
          }).then(() => console.log('Scramjet Proxy: Ready'))
            .catch(err => console.error('Scramjet Proxy: Failed', err));
        });
      }

      // 2. The function to wrap URLs in your React code
      window.proxyURL = function(url) {
        if (!url || url.includes('/scramjet/')) return url;
        
        // Base64 encode the URL for the proxy
        const encoded = btoa(url)
          .replace(/\//g, '_')
          .replace(/\+/g, '-')
          .replace(/=/g, '');
          
        return `/scramjet/${encoded}`;
      };
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
