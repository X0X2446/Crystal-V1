<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crystal — VidLux • Immersive</title>
    <link rel="icon" type="image/svg+xml" href="/crystal.svg">
    
    <script src="/scramjet/scramjet.codecs.js"></script>
    
    <script type="module">
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/scramjet/sw.js', {
            scope: '/scramjet/'
          }).then(() => {
            console.log('Proxy Engine: Ready');
          }).catch(err => console.error('Proxy Engine: Failed', err));
        });
      }

      // Helper function to use in your React code
      window.proxyURL = function(url) {
        if (!url) return "";
        // Encodes the URL so the proxy can read it
        return "/scramjet/" + btoa(url).replace(/\//g, "_").replace(/\+/g, "-").replace(/=/g, "");
      };
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
