<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crystal — VidLux • Immersive</title>
    <link rel="icon" type="image/svg+xml" href="/crystal.svg">
    
    <script type="module">
      // 1. Register the unblocker service worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/scramjet/sw.js', {
            scope: '/scramjet/'
          }).then(() => console.log('Scramjet: Active'))
            .catch(err => console.error('Scramjet: Failed', err));
        });
      }

      // 2. The function you use in your React code
      window.proxyURL = function(url) {
        if (!url) return "";
        // Don't proxy if it's already a proxied URL or a local file
        if (url.includes('/scramjet/')) return url;
        
        // Encode the target URL for the proxy engine
        const encoded = btoa(url)
          .replace(/\//g, '_')
          .replace(/\+/g, '-')
          .replace(/=/g, '');
          
        return `/scramjet/${encoded}`;
      };
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
